<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Μάντεψε το Τραγούδι | Greek Music Trivia</title>
    <style>
        :root {
            --bg-color: #050610;
            --primary-purple: #7C3AED;
            --accent-gold: #FCD34D;
        }
        
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            filter: blur(8px) brightness(0.4);
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, rgba(5,6,16,0.8) 100%);
            z-index: -1;
        }

        /* Language Switcher */
        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .flag-btn {
            width: 35px;
            height: 24px;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s;
            object-fit: cover;
        }
        .flag-btn:hover { transform: scale(1.1); border-color: white; }

        /* Main Card Container */
        .container {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 450px; /* Mobile Default */
            transition: all 0.3s ease;
        }

        /* --- Desktop PC Scaler --- */
        @media (min-width: 1024px) {
            .container {
                max-width: 650px; /* Make card wider on PC */
                padding: 60px 40px;
            }
            .logo { width: 140px !important; height: 140px !important; }
            h1 { font-size: 2.8rem !important; }
            p { font-size: 1.4rem !important; }
            .apple-img { height: 55px !important; }
            .google-img { height: 82px !important; }
            .social-icon { width: 45px !important; height: 45px !important; }
            .social-title { font-size: 1rem !important; }
            .footer-links a { font-size: 1rem !important; }
        }

        .logo { width: 100px; height: 100px; border-radius: 25px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 1.8rem; font-weight: 900; margin: 10px 0; }
        p { color: rgba(255,255,255,0.7); margin-bottom: 25px; font-size: 1rem; }

        .badge-container { display: flex; flex-direction: column; align-items: center; gap: 0; }
        
        /* Adjusted for visual equality */
        .apple-img { height: 44px; width: auto; margin-bottom: 5px; }
        .google-img { height: 66px; width: auto; margin-top: -8px; }

        .social-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .social-title { font-size: 0.8rem; font-weight: 800; color: var(--accent-gold); letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase; }
        .social-grid { display: flex; justify-content: center; gap: 20px; }
        .social-icon { width: 32px; height: 32px; opacity: 0.8; transition: 0.2s; }
        .social-icon:hover { opacity: 1; transform: translateY(-3px); }

        .footer-links { margin-top: 25px; }
        .footer-links a { color: rgba(255,255,255,0.4); font-size: 0.75rem; text-decoration: none; margin: 0 10px; }
        .footer-links a:hover { color: white; text-decoration: underline; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="settings.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="lang-switcher">
        <img src="https://flagcdn.com/w80/gr.png" class="flag-btn" onclick="setLang('el')" alt="Greek">
        <img src="https://flagcdn.com/w80/gb.png" class="flag-btn" onclick="setLang('en')" alt="English">
    </div>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        
        <h1 id="main-title">Μάντεψε το Τραγούδι</h1>
        <p id="main-desc">Το #1 real-time παιχνίδι ελληνικής μουσικής για την παρέα σου!</p>

        <div class="badge-container">
            <a href="https://apps.apple.com/app/idYOUR_ID">
                <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/el-gr?size=250x83" class="apple-img" alt="App Store">
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.guessthegreek.music">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" class="google-img" alt="Play Store">
            </a>
        </div>

        <div class="social-section">
            <div id="follow-title" class="social-title">Ακολούθησε μας</div>
            <div class="social-grid">
                <a href="https://www.tiktok.com/@guessthegreekapp"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="social-icon" alt="TikTok"></a>
                <a href="https://www.instagram.com/guess_the_greek_song/"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="social-icon" alt="Instagram"></a>
                <a href="https://discord.gg/QKtdYZXYh2"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" class="social-icon" alt="Discord"></a>
                <a href="https://www.facebook.com/profile.php?id=61589831472531"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" class="social-icon" alt="Facebook"></a>
            </div>
        </div>

        <div class="footer-links">
            <a href="https://docs.google.com/document/d/1YsZ_tyHPHAW0VttfDoBRyYv1ATzJIHmHI-s8dU_P484/edit?usp=sharing" target="_blank" id="privacy-link">Πολιτική Απορρήτου</a>
            <a href="mailto:your-email@example.com" id="contact-link">Επικοινωνία</a>
        </div>
    </div>

    <script>
        const translations = {
            el: {
                title: "Μάντεψε το Τραγούδι",
                desc: "Το #1 real-time παιχνίδι ελληνικής μουσικής για την παρέα σου!",
                follow: "Ακολούθησε μας",
                contact: "Επικοινωνία",
                privacy: "Πολιτική Απορρήτου"
            },
            en: {
                title: "Guess the Greek Song",
                desc: "The #1 real-time Greek music trivia game for you and your friends!",
                follow: "Follow Us",
                contact: "Contact",
                privacy: "Privacy Policy"
            }
        };

        function setLang(lang) {
            document.getElementById('main-title').innerText = translations[lang].title;
            document.getElementById('main-desc').innerText = translations[lang].desc;
            document.getElementById('follow-title').innerText = translations[lang].follow;
            document.getElementById('contact-link').innerText = translations[lang].contact;
            document.getElementById('privacy-link').innerText = translations[lang].privacy;
            document.documentElement.lang = lang;
        }
    </script>

</body>
</html>
